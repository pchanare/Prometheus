  <text x="310" y="550" text-anchor="middle" fill="#94a3b8" font-size="9">gemini-3.1-flash</text>
  <text x="310" y="563" text-anchor="middle" fill="#94a3b8" font-size="9">-image-preview  (primary)</text>
