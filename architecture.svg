  <text x="507" y="623" text-anchor="middle" fill="#64748b" font-size="9">Local installers</text>

  <rect x="588" y="517" width="138" height="120" rx="5" fill="rgba(168,85,247,0.08)" stroke="#a855f7" stroke-width="0.8"/>
  <text x="657" y="534" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">Data + Search</text>
  <text x="657" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">Document AI</text>
