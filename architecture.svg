  <text x="657" y="579" text-anchor="middle" fill="#64748b" font-size="9">Electricity bills</text>
  <text x="657" y="595" text-anchor="middle" fill="#94a3b8" font-size="9">Custom Search API</text>
  <text x="657" y="609" text-anchor="middle" fill="#64748b" font-size="9">Live pricing data</text>
  <text x="657" y="623" text-anchor="middle" fill="#64748b" font-size="9">State incentives</text>

  <rect x="738" y="517" width="144" height="120" rx="5" fill="rgba(168,85,247,0.08)" stroke="#a855f7" stroke-width="0.8"/>
