<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="browser-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1a3354"/>
    </linearGradient>
    <linearGradient id="cloudrun-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#6b2510"/>
    </linearGradient>
    <linearGradient id="vertex-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="apis-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#4a044e"/>
    </linearGradient>
    <filter id="shadow">
