steps:
  # ── Step 1: Build the Docker image ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent:latest'
      - '.'

  # ── Step 2: Push both tags to Artifact Registry ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - prometheus-agent
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=prometheus-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--min-instances=1'
      - '--max-instances=5'
      - >-
        --set-secrets=MAPS_API_KEY=MAPS_API_KEY:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,GOOGLE_SEARCH_ENGINE_ID=GOOGLE_SEARCH_ENGINE_ID:latest,DOCUMENT_AI_PROCESSOR_ID=DOCUMENT_AI_PROCESSOR_ID:latest,GMAIL_TOKEN=GMAIL_TOKEN:latest
      - >-
        --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=1,SENDER_EMAIL=raizadamisc@gmail.com,MEMORY_BUCKET=$PROJECT_ID-prometheus-memory

# Tag the final image as the build artifact
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/prometheus/agent:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
